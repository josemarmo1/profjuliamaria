<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateliê 3D | Precificação</title>
    <style>
        :root {
            --roxo: #6a4c93;
            --rosa: #ff7e9f;
            --verde: #4dcbb9;
            --fundo: #fdfafb;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .logo { width: 120px; display: block; margin: 0 auto 20px; }
        h2 { color: var(--roxo); text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: var(--roxo); font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        .tempo-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 16px; background: var(--roxo); color: white; border: none; border-radius: 12px; margin-top: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--rosa); }
        .resultado { margin-top: 25px; padding: 20px; background: #fdfafb; border: 2px solid var(--roxo); border-radius: 15px; text-align: center; }
        .valor { font-size: 28px; font-weight: bold; color: var(--roxo); }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo Ateliê 3D">
    
    <h2>Precificador</h2>
    
    <label>Peso da peça (g)</label>
    <input type="number" id="peso" placeholder="Ex: 50">
    
    <div class="tempo-container">
        <div>
            <label>Tempo</label>
            <input type="number" id="tempo" placeholder="Valor">
        </div>
        <div>
            <label>Unidade</label>
            <select id="unidade">
                <option value="1">Horas</option>
                <option value="60">Minutos</option>
            </select>
        </div>
    </div>
    
    <label>Custo do Filamento (R$/kg)</label>
    <input type="number" id="custoFilamento" value="120">
    
    <label>Margem de Lucro (%)</label>
    <input type="number" id="margem" value="300">

    <button onclick="calcular()">Calcular Preço</button>

    <div class="resultado" id="resultadoArea" style="display:none;">
        <p style="margin:0; font-size: 14px;">Sugestão de venda:</p>
        <div class="valor" id="valorFinal">R$ 0,00</div>
    </div>
</div>

<script>
    function calcular() {
        const peso = parseFloat(document.getElementById('peso').value);
        const tempoInput = parseFloat(document.getElementById('tempo').value);
        const unidade = parseFloat(document.getElementById('unidade').value);
        const precoKg = parseFloat(document.getElementById('custoFilamento').value);
        const margem = parseFloat(document.getElementById('margem').value) / 100;

        // Converter tempo para horas (se for minutos, divide por 60)
        const tempoHoras = (unidade === 60) ? (tempoInput / 60) : tempoInput;

        const custoEnergiaHora = 0.20; // Ajustado
        const depreciacaoHora = 0.40;  // Ajustado
        
        const custoMaterial = (peso / 1000) * precoKg;
        const custoOperacional = tempoHoras * (custoEnergiaHora + depreciacaoHora);
        const precoFinal = (custoMaterial + custoOperacional) * (1 + margem);

        document.getElementById('resultadoArea').style.display = 'block';
        document.getElementById('valorFinal').innerText = "R$ " + precoFinal.toFixed(2).replace('.', ',');
    }
</script>

</body>
</html>
